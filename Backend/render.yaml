services:
  - type: web
    name: dhyan-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn core.wsgi:application"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dhyan-db
          property: connectionString
  - type: pserv
    name: dhyan-db
    env: postgresql
    plan: free
    ipAllowList: []